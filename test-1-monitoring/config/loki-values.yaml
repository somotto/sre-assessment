loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
    path_prefix: /tmp/loki
    ring:
      kvstore:
        store: inmemory
  storage:
    type: filesystem
  storage_config:
    filesystem:
      directory: /tmp/loki/chunks
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 24h
  ruler:
    storage:
      type: local
      local:
        directory: /tmp/loki/rules

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 150m
  persistence:
    enabled: false
  extraVolumes:
    - name: loki-data
      emptyDir: {}
  extraVolumeMounts:
    - name: loki-data
      mountPath: /tmp/loki

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

chunksCache:
  enabled: false
resultsCache:
  enabled: false

gateway:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false

service:
  type: ClusterIP
  port: 3100
